# Style preference to panel mapping
style_panels:
  darkEpic:
    guardians: ["rowling"]
    directors: ["yates", "cuaron"]
    description: "黑暗史诗风格：保留代价，深化冲突"

  warmHealing:
    guardians: ["tolkien"]
    directors: ["curtis", "cuaron"]
    description: "温情治愈风格：救赎与失去的平衡"

  auto:
    guardians: ["rowling", "tolkien"]
    directors: ["curtis", "yates"]
    description: "自动选择风格：综合视角"

  realism:
    guardians: ["rowling", "tolkien"]
    directors: ["cuaron"]
    description: "现实主义：克制与内敛"

  fantasyGrand:
    guardians: ["rowling"]
    directors: ["yates"]
    description: "奇幻史诗：宏大与代价"

# Discussion topics and templates
topics:
  - id: "preservation"
    name: "原著底线"
    description: "讨论原著要素的保留与改编空间"
    stage: "topic-1"

  - id: "emotional-curve"
    name: "情绪曲线"
    description: "讨论代价感与救赎的平衡"
    stage: "topic-2"

  - id: "execution"
    name: "镜头执行"
    description: "讨论可拍摄方案的具体实现"
    stage: "topic-3"

# Dialogue templates for discussions
dialogue_templates:
  preservation:
    - role: "guardian"
      template: "从原著的角度看，{element} 是不能放弃的核心。"
    - role: "director"
      template: "我理解这一点，但从改编的视角，我们可以通过 {approach} 来保留这种精神。"
    - role: "crew"
      template: "在执行层面，我们可以用 {technique} 来强化这个主题。"

  emotional:
    - role: "guardian"
      template: "原著中 {character} 的代价是 {sacrifice}，这对故事意义重大。"
    - role: "director"
      template: "完全同意，我们的版本将通过 {method} 来承载这份代价。"
    - role: "crew"
      template: "从视听效果看，{medium} 最能传达这种情感张力。"

  technical:
    - role: "director"
      template: "从镜头角度，我建议用 {shot_type} 来展现 {moment}。"
    - role: "crew"
      template: "可以配合 {element}，效果会更强。"
    - role: "guardian"
      template: "这个方案既保留了原著精神，又体现了电影特色。"
